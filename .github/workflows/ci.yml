name: CI

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'proto/**'
      - 'scripts/**'
      - 'buf.*'
      - 'go.*'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'proto/**'
      - 'scripts/**'
      - 'buf.*'
      - 'go.*'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/ci.yml'

env:
  GONOSUMDB: github.com/cinchcli
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: cinch_test
          POSTGRES_USER: cinch
          POSTGRES_PASSWORD: cinch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://cinch:cinch@localhost:5432/cinch_test?sslmode=disable
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc

      # Buf / proto codegen / drift check removed: relay no longer owns
      # the wire schema. cinchcli/cinch-core is the source of truth and
      # ships generated Go bindings via go.mod; lint/breaking-change
      # gates run in cinchcli/cinch-core's own CI.

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go'))
          if [ -n "$unformatted" ]; then
            echo "::error::Files not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.12.1

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build relay
        run: CGO_ENABLED=1 go build -o dist/relay ./cmd/relay

  verify-proto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout relay
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          path: relay
      - name: Checkout cinch monorepo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          repository: cinchcli/cinch
          path: cinch
      - name: Verify proto vendor matches upstream
        run: |
          cd relay
          UPSTREAM=../cinch ./scripts/verify-proto.sh
