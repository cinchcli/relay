name: CI

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'proto/**'
      - 'go.*'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'proto/**'
      - 'go.*'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Install proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest

      - name: Buf lint
        run: buf lint

      - name: Buf breaking change check
        run: buf breaking --against '.git#branch=main'
        if: github.event_name == 'pull_request'

      - name: Proto drift check (generated code matches proto)
        run: |
          make generate
          git diff --exit-code internal/gen/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build relay
        run: CGO_ENABLED=1 go build -o dist/relay ./cmd/relay

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cinchcli/relay
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
