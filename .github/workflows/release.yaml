name: goreleaser

on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.*'
      - '.goreleaser.yaml'
      - '.github/workflows/release.yaml'
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip build, only deploy latest image to production'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run GoReleaser
        if: ${{ !inputs.deploy_only }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ github.event_name == 'pull_request' && 'release --snapshot --skip=publish --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to api.cinchcli.com
    runs-on: ubuntu-latest
    needs: goreleaser
    # Run on tag push or manual dispatch; skip on PRs (snapshot build only)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Roll new image on OCI VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.RELAY_SSH_HOST }}
          username: ${{ secrets.RELAY_SSH_USER }}
          key: ${{ secrets.RELAY_SSH_KEY }}
          script: |
            set -e
            docker pull ghcr.io/cinchcli/relay:latest
            docker restart cinch-relay
            # Quick health check — fail the deploy if the relay isn't up
            sleep 3
            curl -sf http://localhost:8080/health | grep -q ok
