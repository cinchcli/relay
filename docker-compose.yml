services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: cinch
      POSTGRES_USER: cinch
      POSTGRES_PASSWORD: cinch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinch"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  relay:
    image: ghcr.io/cinchcli/relay:latest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://cinch:cinch@postgres:5432/cinch?sslmode=disable
      # BASE_URL is required for OAuth sign-in (leave unset to use username form)
      # BASE_URL=https://relay.example.com
      #
      # GitHub OAuth (optional — enables "Sign in with GitHub")
      # GITHUB_CLIENT_ID=
      # GITHUB_CLIENT_SECRET=
      #
      # Google OAuth (optional — enables "Sign in with Google")
      # GOOGLE_CLIENT_ID=
      # GOOGLE_CLIENT_SECRET=
      #
      # Extra CORS origins, comma-separated (optional)
      # CORS_ORIGINS=https://your-frontend.example.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
