services:
  relay:
    image: ghcr.io/cinchcli/relay:latest
    ports:
      - "8080:8080"
    volumes:
      - relay-data:/data
    environment:
      - PORT=8080
      - DB_PATH=/data/cinch.db
      # BASE_URL is required for OAuth sign-in (leave unset to use username form)
      # BASE_URL=https://relay.example.com
      #
      # GitHub OAuth (optional — enables "Sign in with GitHub")
      # GITHUB_CLIENT_ID=
      # GITHUB_CLIENT_SECRET=
      #
      # Google OAuth (optional — enables "Sign in with Google")
      # GOOGLE_CLIENT_ID=
      # GOOGLE_CLIENT_SECRET=
      #
      # Extra CORS origins, comma-separated (optional)
      # CORS_ORIGINS=https://your-frontend.example.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  relay-data:
