version: "2"

run:
  timeout: 5m

linters:
  default: none
  # TODO: enable errcheck + gosec after a dedicated cleanup pass — both
  # raise dozens of warnings on existing Close()/Write() calls and on
  # G114/G115/G304/G706 patterns that mostly need targeted review.
  enable:
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused

  settings:
    revive:
      rules:
        - name: unused-parameter
          disabled: true
    staticcheck:
      checks:
        - all
        - "-QF*"   # quickfix suggestions are stylistic, not bugs

  exclusions:
    paths:
      - internal/cinchv1    # generated protobuf + connect bindings
